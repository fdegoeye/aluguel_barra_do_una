name: "Publicador Diário"

# Roda todos os dias às 08:00 (BRT) = 11:00 UTC
on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  publish:
    name: Publica post do dia no Instagram
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instala dependências
        run: pip install -r requirements.txt

      - name: Publica post agendado
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RAW_BASE: "https://raw.githubusercontent.com/${{ github.repository }}/main/assets/photos"
          PERSONAL_INSTAGRAM_ACCESS_TOKEN: ${{ secrets.PERSONAL_INSTAGRAM_ACCESS_TOKEN }}
          PERSONAL_INSTAGRAM_USER_ID: ${{ secrets.PERSONAL_INSTAGRAM_USER_ID }}
        run: python agents/publisher.py
