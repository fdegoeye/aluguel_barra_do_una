name: "Corrige INSTAGRAM_USER_ID"

on:
  workflow_dispatch:

jobs:
  fix-user-id:
    runs-on: ubuntu-latest
    steps:
      - name: Busca ID correto e atualiza secret
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_SECRETS }}
        run: |
          RESPONSE=$(curl -s "https://graph.instagram.com/v23.0/me?fields=id,username,account_type&access_token=$INSTAGRAM_ACCESS_TOKEN")
          echo "Resposta da API: $RESPONSE"
          USER_ID=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "ID correto: $USER_ID"
          gh secret set INSTAGRAM_USER_ID --body "$USER_ID" --repo ${{ github.repository }}
          echo "Secret atualizado com sucesso!"
