name: "Processa Aprovações do Telegram"

# Verifica a cada 10 minutos se Francisco pressionou algum botão de aprovação
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  process-approvals:
    name: Processa botões de aprovação pressionados
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instala dependências
        run: pip install -r requirements.txt

      - name: Processa aprovações
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python agents/telegram_bot.py poll-approvals
